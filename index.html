    <script type="module">
      import init, { load } from "./pkg/search_engin.js";

      init().then(async () => {
        // Two-phase API: load once, search many times
        const engine = await load({
          search: {
            "feed_url": "./search.xml",
            "match_fields": ["title", "author"],
            "skim": {}
          },
          ui: {
            "page": {
              "template_id": "element",
              "list_id": "list",
              "inner": {
                "template_id": "tag",
                "list_id": "tags",
                "edit": [
                  {
                    "id": "link_tag",
                    "html_field": {"type": "InnerHTML"},
                    "article_field": "taxonomies.tags"
                  }
                ]
              },
              "edit": [
                {"id": "title", "html_field": {"type": "InnerHTML"}, "article_field": "title"},
                {"id": "link_img", "html_field": {"type": "Attribute", "value": "aria-label"}, "article_field": "title"},
                {"id": "img", "html_field": {"type": "Attribute", "value": "alt"}, "article_field": "title"},
                {"id": "img", "html_field": {"type": "Attribute", "value": "src"}, "article_field": "img"},
                {"id": "link_img", "html_field": {"type": "Attribute", "value": "href"}, "article_field": "link"},
                {"id": "link_title", "html_field": {"type": "Attribute", "value": "href"}, "article_field": "link"},
                {"id": "description", "html_field": {"type": "InnerHTML"}, "article_field": "description"},
                {"id": "date", "html_field": {"type": "InnerHTML"}, "article_field": "date"},
                {"id": "cooking-time", "html_field": {"type": "InnerHTML"}, "article_field": "cooking-time"}
              ]
            }
          }
        });

        const params = new URLSearchParams(window.location.search);
        const query = params.get("query");

        const filters = engine.get_filters_url();
        engine.set_filters_html(filters);

        function runSearch() {
          engine.reset();
          const filters = engine.get_filters_html();
          engine.set_filters_url(filters);
          if (query !== null) {
            engine.search_with_filters(query, filters);
          }
        }

        runSearch();

        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          cb.addEventListener("change", runSearch);
        });
      });
    </script>
