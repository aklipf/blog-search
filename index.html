<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>hello-wasm example</title>
  </head>
  <body>
    <script type="module">
      import init, { run } from "./pkg/search_engin.js";

      init().then(() => {
        run({
          search: {
            "feed_url": "./search.xml",
            "match_fields": ["title", "author"]
          },
          ui:{
            "page":{
            "template_id": "element",
            "list_id": "list",
            "inner": {
              "template_id": "tag",
              "list_id": "tags",
              "edit": [
                {
                  "id": "link_tag",
                  "html_field": {"type": "InnerHTML"},
                  "article_field": "taxonomies.tags"
                }
              ]
            },
            "edit": [
              {
                "id": "title",
                "html_field": {"type": "InnerHTML"},
                "article_field": "title",
              },
              {
                "id": "link_img",
                "html_field": {"type": "Attribute", "value": "aria-label"},
                "article_field": "title",
              },
              {
                "id": "img",
                "html_field": {"type": "Attribute", "value": "alt"},
                "article_field": "title",
              },
              {
                "id": "img",
                "html_field": {"type": "Attribute", "value": "src"},
                "article_field": "img",
              },
              {
                "id": "link_img",
                "html_field": {"type": "Attribute", "value": "href"},
                "article_field": "link",
              },
              {
                "id": "link_title",
                "html_field": {"type": "Attribute", "value": "href"},
                "article_field": "link",
              },
              {
                "id": "description",
                "html_field": {"type": "InnerHTML"},
                "article_field": "description",
              },
              {
                "id": "date",
                "html_field": {"type": "InnerHTML"},
                "article_field": "date",
              },
              {
                "id": "cooking-time",
                "html_field": {"type": "InnerHTML"},
                "article_field": "cooking-time",
              }
            ]
          }
          }
        });
      });
    </script>
<div class="flex flex-col rounded-md shadow-md overflow-hidden hidden"  id="element">
  <div class="flex-shrink-0">
    <a href="" aria-label="Sans titre" id="link_img">
      <img src="" id="img" alt="Sans titre" />
    </a>
  </div>
  <div class="flex-1 bg-white p-6 flex flex-col justify-between">
    <div class="flex-1">
      <a href="" class="block"  id="link_title">
        <h3 class="mt-2 text-xl leading-7 font-semibold text-gray-900"  id="title"></h3>
      </a>
      <p class="mt-3 text-base leading-6 text-gray-500", id="description"></p>
    </div>
    <div class="mt-6 flex items-center">
      <div>
        
      </div>
    </div>
  </div>
    <div>
      <time id="date"></time>
      <span id="cooking-time"></span>
    </div>
</div>

<div id="list">
</div>

</body>
</html>
